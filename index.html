<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pronunciation Master</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 20px; color: #fff;
            background: linear-gradient(135deg, #4b2a61 0%, #2f6966 100%); 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        
        .container { 
            width: 100%; max-width: 500px; 
            background: rgba(0, 0, 0, 0.2); padding: 25px; 
            border-radius: 20px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 { text-align: center; font-weight: 300; letter-spacing: 1px; margin-bottom: 30px; }
        .section { margin-bottom: 40px; }
        .label { font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-bottom: 10px; display: block; }
        
        /* 파형 컨테이너 */
        .wave-box { 
            position: relative; width: 100%; height: 120px; 
            background: rgba(0, 0, 0, 0.3); border-radius: 12px; 
            margin-bottom: 15px; overflow: hidden; 
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        /* 재생 막대 (Playhead) - CSS transition 제거로 끊김 방지 */
        .playhead { 
            position: absolute; top: 0; left: 0; width: 2px; height: 100%; 
            background: #ff3b30; box-shadow: 0 0 10px rgba(255, 59, 48, 0.8);
            pointer-events: none; z-index: 5; transform: translateX(-50%);
        }

        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        button { 
            flex: 1; padding: 15px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; color: white;
            background: rgba(255, 255, 255, 0.15); cursor: pointer;
            transition: background 0.3s;
        }
        button:active { background: rgba(255, 255, 255, 0.3); }
        button#record-btn { background: #ff3b30; }
        button#record-btn.recording { animation: pulse 1s infinite; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        audio { width: 100%; height: 40px; filter: invert(100%); opacity: 0.7; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>English Accent Guide</h2>
    
    <div class="section">
        <span class="label">NATIVE SPEAKER</span>
        <div class="wave-box">
            <canvas id="native-canvas"></canvas>
            <div id="native-playhead" class="playhead"></div>
        </div>
        <audio id="native-audio" src="native_sample.mp3" controls crossorigin="anonymous"></audio>
    </div>

    <div class="section">
        <span class="label">MY RECORDING</span>
        <div class="wave-box">
            <canvas id="user-canvas"></canvas>
            <div id="user-playhead" class="playhead"></div>
        </div>
        <div class="controls">
            <button id="record-btn">🔴 Record</button>
            <button id="stop-btn" disabled>⏹️ Stop</button>
        </div>
        <audio id="user-audio" controls></audio>
    </div>
</div>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    // 요소 선택
    const nativeAudio = document.getElementById('native-audio');
    const nativeCanvas = document.getElementById('native-canvas');
    const nativePlayhead = document.getElementById('native-playhead');
    const userAudio = document.getElementById('user-audio');
    const userCanvas = document.getElementById('user-canvas');
    const userPlayhead = document.getElementById('user-playhead');
    const recordBtn = document.getElementById('record-btn');
    const stopBtn = document.getElementById('stop-btn');

    let nativeBuffer, userBuffer;
    let nativeAnimId, userAnimId;
    let mediaRecorder, audioChunks = [];

    // 1. 초기화 (사용자 인터렉션 대응)
    function initCtx() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // 2. 파형 그리기 (그라데이션 + 대칭)
    function drawWaveform(buffer, canvas) {
        const ctx = canvas.getContext('2d');
        const data = buffer.getChannelData(0);
        const width = canvas.width = canvas.offsetWidth * 2; // 고해상도 대응
        const height = canvas.height = canvas.offsetHeight * 2;
        const step = Math.ceil(data.length / width);
        const amp = height / 2;

        ctx.clearRect(0, 0, width, height);
        
        // 그라데이션 생성
        const grad = ctx.createLinearGradient(0, 0, 0, height);
        grad.addColorStop(0, '#add8e6'); // 상단 연청
        grad.addColorStop(0.5, '#e6beff'); // 중앙 연보라
        grad.addColorStop(1, '#add8e6'); // 하단 연청
        
        ctx.strokeStyle = grad;
        ctx.lineWidth = 2;
        ctx.beginPath();

        for (let i = 0; i < width; i++) {
            let min = 1.0, max = -1.0;
            for (let j = 0; j < step; j++) {
                const datum = data[(i * step) + j];
                if (datum < min) min = datum;
                if (datum > max) max = datum;
            }
            // 중앙 대칭선 그리기
            ctx.moveTo(i, (1 + min) * amp);
            ctx.lineTo(i, (1 + max) * amp);
        }
        ctx.stroke();
    }

    // 3. 부드러운 재생 막대 이동 (requestAnimationFrame)
    function animateNative() {
        if (!nativeAudio.paused && !nativeAudio.ended) {
            const prog = (nativeAudio.currentTime / nativeAudio.duration) * 100;
            nativePlayhead.style.left = prog + '%';
            nativeAnimId = requestAnimationFrame(animateNative);
        }
    }

    function animateUser() {
        if (!userAudio.paused && !userAudio.ended) {
            const prog = (userAudio.currentTime / userAudio.duration) * 100;
            userPlayhead.style.left = prog + '%';
            userAnimId = requestAnimationFrame(animateUser);
        }
    }

    // 4. 네이티브 파일 로드 및 이벤트
    async function loadNative() {
        if (!nativeAudio.src || nativeAudio.src.includes('undefined')) return;
        try {
            const res = await fetch(nativeAudio.src);
            const arrayBuffer = await res.arrayBuffer();
            nativeBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            drawWaveform(nativeBuffer, nativeCanvas);
        } catch (e) { console.error("Native load error", e); }
    }

    nativeAudio.onplay = () => { initCtx(); animateNative(); };
    nativeAudio.onpause = () => cancelAnimationFrame(nativeAnimId);
    nativeAudio.onseeked = () => {
        const prog = (nativeAudio.currentTime / nativeAudio.duration) * 100;
        nativePlayhead.style.left = prog + '%';
    };

    // 5. 녹음 로직
    recordBtn.onclick = async () => {
        initCtx();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks);
                userAudio.src = URL.createObjectURL(blob);
                const arrayBuffer = await blob.arrayBuffer();
                userBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                drawWaveform(userBuffer, userCanvas);
                userPlayhead.style.left = '0%';
                stream.getTracks().forEach(t => t.stop());
            };

            mediaRecorder.start();
            recordBtn.disabled = true; stopBtn.disabled = false;
            recordBtn.classList.add('recording');
        } catch (e) { alert("마이크 권한이 필요합니다."); }
    };

    stopBtn.onclick = () => {
        mediaRecorder.stop();
        recordBtn.disabled = false; stopBtn.disabled = true;
        recordBtn.classList.remove('recording');
    };

    userAudio.onplay = () => animateUser();
    userAudio.onpause = () => cancelAnimationFrame(userAnimId);
    userAudio.onseeked = () => {
        const prog = (userAudio.currentTime / userAudio.duration) * 100;
        userPlayhead.style.left = prog + '%';
    };

    // 페이지 로드 후 네이티브 분석 시작
    window.onload = () => {
        // 사용자가 처음 클릭할 때 컨텍스트가 활성화되므로 로드는 별도로 진행
        if(nativeAudio.src) {
            // 오디오 컨텍스트가 클릭 전엔 생성이 안될 수 있으므로 임시 생성
            audioCtx = new AudioContext();
            loadNative();
        }
    };
</script>
</body>
</html>
