<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 발음 교정 트레이너</title>
    <style>
        :root { --accent: #ff3b30; --native-color: #00d4ff; --user-color: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, sans-serif; margin: 0; padding: 20px; color: #fff;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        .app-container { width: 100%; max-width: 500px; }

        /* 문장 카드 */
        .sentence-card {
            background: rgba(255, 255, 255, 0.05); padding: 30px 20px; border-radius: 20px;
            margin-bottom: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .sentence-en { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; color: #fff; }
        .sentence-ko { font-size: 1rem; color: rgba(255,255,255,0.5); }

        .section { margin-bottom: 35px; }
        .label { font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        .native-label { color: var(--native-color); }
        .user-label { color: var(--user-color); }

        /* 파형 박스 및 막대 */
        .wave-box { 
            position: relative; width: 100%; height: 120px; 
            background: rgba(0, 0, 0, 0.4); border-radius: 15px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        /* 재생 막대 (Playhead) - transition 절대 금지 */
        .playhead { 
            position: absolute; top: 0; left: 0; width: 2px; height: 100%; 
            background: var(--accent); box-shadow: 0 0 12px var(--accent);
            pointer-events: none; z-index: 10; transform: translateX(-50%);
            transition: none !important;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { 
            flex: 1; padding: 18px; border: none; border-radius: 15px;
            font-size: 16px; font-weight: bold; color: white;
            background: rgba(255, 255, 255, 0.1); cursor: pointer;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.2); }
        
        button.primary { background: #007aff; }
        button.record { background: var(--accent); }
        button.record.recording { animation: blink 1s infinite; }
        button.sync { background: #34c759; }
        button:disabled { opacity: 0.2; transform: none; }

        audio { display: none; } /* 오디오 태그 숨김 */

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sentence-card">
        <div class="sentence-en">"Practice makes perfect."</div>
        <div class="sentence-ko">"연습이 완벽을 만듭니다."</div>
    </div>
    
    <div class="section">
        <span class="label native-label">● NATIVE SPEAKER</span>
        <div class="wave-box">
            <canvas id="native-canvas"></canvas>
            <div id="native-playhead" class="playhead"></div>
        </div>
        <div class="btn-group">
            <button class="primary" onclick="handleNativePlay()">▶ 네이티브 듣기</button>
        </div>
        <audio id="native-audio" src="https://actions.google.com/sounds/v1/speech/voices_reading_a_poem.ogg" crossorigin="anonymous"></audio>
    </div>

    <div class="section">
        <span class="label user-label">● MY VOICE</span>
        <div class="wave-box">
            <canvas id="user-canvas"></canvas>
            <div id="user-playhead" class="playhead"></div>
        </div>
        <div class="btn-group">
            <button id="record-btn" class="record" onclick="toggleRecording()">🔴 녹음 시작</button>
            <button id="sync-btn" class="sync" onclick="handleSyncPlay()" disabled>🔄 동시 비교 재생</button>
        </div>
        <audio id="user-audio" controls></audio>
    </div>
</div>

<script>
    let audioCtx;
    const nativeAudio = document.getElementById('native-audio');
    const userAudio = document.getElementById('user-audio');
    const nativePlayhead = document.getElementById('native-playhead');
    const userPlayhead = document.getElementById('user-playhead');
    const recordBtn = document.getElementById('record-btn');
    const syncBtn = document.getElementById('sync-btn');

    let nativeBuffer, userBuffer;
    let mediaRecorder, chunks = [];

    // [핵심] 오디오 컨텍스트 초기화 및 잠금 해제
    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
    }

    // 파형 분석 및 그리기 (이미지 스타일 반영
