<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 발음 파형 비교</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .section { margin-bottom: 30px; }
        canvas { width: 100%; height: 150px; background-color: #222; border-radius: 5px; margin-top: 10px; display: block; }
        button { padding: 10px 15px; border: none; border-radius: 5px; background-color: #007bff; color: white; cursor: pointer; font-size: 14px; margin-right: 5px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button.recording { background-color: #dc3545; animation: pulse 1.5s infinite; }
        audio { width: 100%; margin-top: 10px; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🗣️ 음성 파형 비교 학습</h2>
    
    <div class="section">
        <h3>Native Speaker</h3>
        <audio id="native-audio" src="native_sample.mp3" controls crossorigin="anonymous"></audio>
        <canvas id="native-canvas"></canvas>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div class="section">
        <h3>My Recording</h3>
        <div>
            <button id="record-btn">🔴 녹음 시작</button>
            <button id="stop-btn" disabled>⏹️ 녹음 중지</button>
        </div>
        <audio id="user-audio" controls></audio>
        <canvas id="user-canvas"></canvas>
    </div>
</div>

<script>
    // Audio Context 설정 (브라우저 호환성)
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    // DOM 요소
    const nativeAudio = document.getElementById('native-audio');
    const nativeCanvas = document.getElementById('native-canvas');
    const userAudio = document.getElementById('user-audio');
    const userCanvas = document.getElementById('user-canvas');
    const recordBtn = document.getElementById('record-btn');
    const stopBtn = document.getElementById('stop-btn');

    let mediaRecorder;
    let audioChunks = [];
    let isNativeVisualized = false;

    // 파형(막대)을 그리는 공통 함수
    function drawVisualizer(sourceNode, canvasElem) {
        const canvasCtx = canvasElem.getContext('2d');
        const analyser = audioCtx.createAnalyser();
        
        sourceNode.connect(analyser);
        // 막대 개수 조절 (값이 클수록 막대가 얇아지고 많아짐)
        analyser.fftSize = 256; 
        
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        // 캔버스 크기 맞춤
        canvasElem.width = canvasElem.clientWidth;
        canvasElem.height = canvasElem.clientHeight;

        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);

            // 배경 그리기
            canvasCtx.fillStyle = '#222';
            canvasCtx.fillRect(0, 0, canvasElem.width, canvasElem.height);

            // 막대 그리기
            const barWidth = (canvasElem.width / bufferLength) * 2.5;
            let barHeight;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] / 2; // 높이 스케일링
                
                // 막대 색상 (아래쪽은 파란색, 위로 갈수록 밝아짐)
                canvasCtx.fillStyle = `rgb(${barHeight + 100}, 50, 250)`;
                canvasCtx.fillRect(x, canvasElem.height - barHeight, barWidth, barHeight);

                x += barWidth + 1; // 1px 간격
            }
        }
        draw();
    }

    // 1. 네이티브 오디오 시각화 연결 (재생 시 1회 연결)
    nativeAudio.
